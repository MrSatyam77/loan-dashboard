<div class="dashboard-container">
  <!-- Header -->
    <app-header></app-header>
  <!-- Main Content -->
  <div class="dashboard-content">
    <!-- Summary Cards -->
    <div class="summary-cards-section">
      @for (card of summaryCards(); track card.label) {
        <app-summary-card
          [label]="card.label"
          [value]="card.value"
          [trend]="card.trend"
          [icon]="card.icon">
        </app-summary-card>
      }
    </div>
    <!-- Main Content Area: Table + Chart -->
    <div class="main-content-row">
      <!-- Left: Loan Records Table -->
      <mat-card class="table-section">
        <mat-card-content>
          <div class="section-header">LOAN RECORDS</div>
          <div class="search-section">
            <mat-form-field appearance="outline" class="search-input">
              <input 
                matInput
                type="text"
                [(ngModel)]="searchTerm"
                (ngModelChange)="onSearchChange($event)"
                placeholder="Search by name, ID...">
            </mat-form-field>
          </div>
          <app-data-table
            [data]="filteredLoans()"
            [columns]="loanColumns"
            (deleteLoan)="onDeleteLoan($event)">
          </app-data-table>
        </mat-card-content>
      </mat-card>
      <!-- Right: Loan Distribution Chart -->
      <mat-card class="chart-section">
        <mat-card-content>
          <div class="section-header">LOAN DISTRIBUTION</div>
          <app-loan-distribution-chart 
            [distribution]="loanDistribution()">
          </app-loan-distribution-chart>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
