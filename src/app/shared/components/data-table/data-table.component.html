<div class="table-container">
  <table mat-table [dataSource]="dataSource" matSort class="loan-table">
    
    <!-- Loan ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Loan ID </th>
      <td mat-cell *matCellDef="let loan"> {{ loan.id }} </td>
    </ng-container>

    <!-- Borrower Name Column -->
    <ng-container matColumnDef="borrowerName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Borrower </th>
      <td mat-cell *matCellDef="let loan"> {{ loan.borrowerName }} </td>
    </ng-container>

    <!-- Amount Column -->
    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Amount </th>
      <td mat-cell *matCellDef="let loan"> {{ formatCurrency(loan.amount) }} </td>
    </ng-container>

    <!-- Interest Rate Column -->
    <ng-container matColumnDef="rate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Rate </th>
      <td mat-cell *matCellDef="let loan"> {{ formatRate(loan.rate) }} </td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
      <td mat-cell *matCellDef="let loan">
        <span class="status-chip" [class]="getStatusClass(loan.status)">
          {{ loan.status }}
        </span>
      </td>
    </ng-container>

    <!-- Origination Date Column -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Date </th>
      <td mat-cell *matCellDef="let loan"> {{ loan.date }} </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let loan">
        <button mat-stroked-button (click)="onDeleteClick(loan)" class="delete-button" aria-label="Delete loan">
          Delete
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator 
    [pageSizeOptions]="[10, 25, 50]" 
    [pageSize]="10"
    showFirstLastButtons
    aria-label="Select page of loans">
  </mat-paginator>
</div>
