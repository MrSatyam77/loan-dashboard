<div class="table-container">
  <table mat-table [dataSource]="dataSource" matSort class="loan-table">
    
    <!-- Dynamic Columns -->
    @for (col of columns; track col.key) {
      <ng-container [matColumnDef]="col.key">
        @if (col.sortable !== false) {
          <th mat-header-cell *matHeaderCellDef mat-sort-header> {{ col.header }} </th>
        } @else {
          <th mat-header-cell *matHeaderCellDef> {{ col.header }} </th>
        }
        <td mat-cell *matCellDef="let row">
          @if (col.type === 'status') {
            <span class="status-chip" [class]="getStatusClass(row[col.key])">
              {{ row[col.key] }}
            </span>
          } @else {
            {{ formatCell(row[col.key], col.type) }}
          }
        </td>
      </ng-container>
    }

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <button mat-stroked-button (click)="onDeleteClick(row)" class="delete-button" aria-label="Delete loan">
          Delete
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator 
    [pageSizeOptions]="[5, 10, 25, 50]" 
    [pageSize]="10"
    showFirstLastButtons
    aria-label="Select page of loans">
  </mat-paginator>
</div>
